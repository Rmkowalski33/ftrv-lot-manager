<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0f1a">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <title>FTRV Lot Manager</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

  <!-- ── Access Code Gate ── -->
  <div id="gateScreen" class="gate-screen">
    <div class="gate-card">
      <div class="gate-logo">
        <span class="brand-fun">FUN TOWN</span>
        <span class="brand-rv">RV</span>
      </div>
      <div class="gate-title">Lot Manager</div>
      <div class="gate-subtitle">Enter your access code to continue</div>
      <input id="gateInput" class="gate-input" type="text" placeholder="Access Code"
             autocomplete="off" autocapitalize="characters" spellcheck="false">
      <div id="gateError" class="gate-error" style="display:none;">Invalid code. Try again.</div>
      <button id="gateSubmit" class="gate-btn">Enter</button>
      <div class="gate-rayi">RAY.i</div>
    </div>
  </div>

  <!-- ── App Shell (hidden until authenticated) ── -->
  <div id="appShell">

    <!-- ── Status bar (sync indicator) ── -->
    <div id="syncBar" class="sync-bar hidden">
      <div class="sync-bar-inner">
        <span class="sync-spinner"></span>
        <span id="syncMsg">Syncing inventory...</span>
      </div>
    </div>

    <!-- ── App header ── -->
    <header class="app-header">
      <div style="display:flex;align-items:center;gap:10px;">
        <button id="headerBack" class="header-back" style="display:none;" onclick="history.back()">
          <svg viewBox="0 0 24 24" width="22" height="22"><path d="M15 18l-6-6 6-6" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
        </button>
        <div class="header-brand">
          <span class="brand-fun">FUN TOWN</span>
          <span class="brand-rv">RV</span>
        </div>
      </div>
      <div class="header-meta">
        <span id="headerBadge" class="header-badge">CLE</span>
        <span id="headerOnline" class="online-dot online"></span>
      </div>
    </header>

    <!-- ── View container ── -->
    <main id="viewContainer" class="view-container">
    </main>

    <!-- ── Bottom tab bar (4 tabs) ── -->
    <nav class="tab-bar">
      <a class="tab active" data-view="home" href="#home">
        <svg class="tab-icon" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="tab-label">Home</span>
      </a>
      <a class="tab" data-view="notes" href="#notes">
        <svg class="tab-icon" viewBox="0 0 24 24"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="tab-label">Notes</span>
      </a>
      <a class="tab" data-view="audit" href="#audit">
        <svg class="tab-icon" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="tab-label">Audit</span>
      </a>
      <a class="tab" data-view="coverage" href="#coverage">
        <svg class="tab-icon" viewBox="0 0 24 24"><path d="M4 6h16M4 10h16M4 14h16M4 18h16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M9 6v12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="2 2"/></svg>
        <span class="tab-label">Coverage</span>
      </a>
    </nav>

  </div><!-- /appShell -->

  <!-- ── Scripts ── -->
  <script src="js/db.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/views.js"></script>
  <script src="js/app.js"></script>
  <script src="js/gate.js"></script>
</body>
</html>
